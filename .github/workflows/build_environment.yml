name: Build HeaterFlameDetection on Environment

on:
  deployment:

permissions:
  contents: read
  deployments: write

jobs:
  build:
    runs-on: [self-hosted, iot]
    environment: Home

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize Arduino CLI
        run: |
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file "$Env:RUNNER_TOOL_CACHE\arduino-cli\config.yaml" core update-index

      - name: Install required board core
        run: |
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file "$Env:RUNNER_TOOL_CACHE\arduino-cli\config.yaml" core install arduino:avr@1.8.7

      - name: Compile Arduino project
        run: |
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file "$Env:RUNNER_TOOL_CACHE\arduino-cli\config.yaml" compile --fqbn arduino:avr:nano ./HeaterFlameDetection --output-dir build

      - name: Upload firmware to Arduino
        env:
          SERIAL_PORT: ${{ github.event.deployment.payload.serial_port }}
        run: |
          if ($env:SERIAL_PORT -notmatch '^COM\d+$') {
            Write-Error "Invalid serial port format: $env:SERIAL_PORT"
            exit 1
          }
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file "$Env:RUNNER_TOOL_CACHE\arduino-cli\config.yaml" upload --fqbn arduino:avr:nano --port $env:SERIAL_PORT --input-dir build
